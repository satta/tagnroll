name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install GTK3 and VTE dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config libvte-2.91-dev

      - name: Build application
        run: |
          go mod tidy
          go build -o build/tagnroll

      - name: Prepare AppDir
        run: |
          mkdir -p build/AppDir/usr/bin
          mkdir -p build/AppDir/usr/share/applications
          mkdir -p build/AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/tagnroll build/AppDir/usr/bin/
          cat > build/AppDir/usr/share/applications/tagnroll.desktop << 'EOF'
          [Desktop Entry]
          Name=Tag'n'Roll
          Exec=tagnroll
          Icon=tagnroll
          Type=Application
          Categories=Utility;Engineering;
          Comment=GTK GUI for managing Creality RFID tags
          EOF
          cp screen.png build/AppDir/usr/share/icons/hicolor/256x256/apps/tagnroll.png

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="git-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage --appdir build/AppDir --output appimage
          mv tagnroll*.AppImage "tagnroll-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tagnroll-binary
          path: build/tagnroll
          if-no-files-found: error

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tagnroll-appimage
          path: tagnroll-${{ steps.version.outputs.version }}-x86_64.AppImage
          if-no-files-found: ignore

  release:
    needs: build-appimage
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tagnroll-binary/tagnroll
            artifacts/tagnroll-appimage/tagnroll-*-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
